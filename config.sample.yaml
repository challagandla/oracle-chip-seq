species: human

references:
  human:
    genome: "/path/to/hg38.fa"
    annotation: "/path/to/hg38.gtf"
    transcriptome: "/path/to/hg38.transcripts.fa"
    chrom_sizes: "/path/to/hg38.chrom.sizes"
    black_list: "/path/to/hg38-blacklist.v2.bed"
    bt2_index: "/path/to/hg38"
    name: "hg38"
    gsize: "2.7e9"

chip_controls:
  - id: Input_rep1
    fastq:
      - data/raw/Input_rep1_R1.fastq.gz
      - data/raw/Input_rep1_R2.fastq.gz

chip_samples:
  - id: H3K27ac_rep1
    fastq:
      - data/raw/H3K27ac_rep1_R1.fastq.gz
      - data/raw/H3K27ac_rep1_R2.fastq.gz
    control: Input_rep1
    condition: treated
    replicate: 1

rna_samples:
  - id: RNA_rep1
    fastq:
      - data/raw/RNA_rep1_R1.fastq.gz
      - data/raw/RNA_rep1_R2.fastq.gz
    condition: treated
    replicate: 1
